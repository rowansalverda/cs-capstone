<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AUVIC Submarine Viewer</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #info {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(255, 255, 255, 0.85);
      padding: 10px 14px;
      border-radius: 8px;
      z-index: 10;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="info">Drag to rotate • Scroll to zoom</div>
  <script type="module" src="./main.js"></script>
</body>
</html>
